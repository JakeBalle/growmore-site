<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>GrowMore Soil & Pasture Tuning</title>

  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <!-- NAV -->
  <header class="nav">
    <div class="nav-container">

      <div class="nav-logo"></div>

      <nav class="nav-links" id="navLinks">
        <a href="about.html">About</a>
        <a href="how-it-works.html">How It Works</a>
        <a href="international.html">International</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="download.html">Download</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    </div>
  </header>

  <!-- LANDING (UNCHANGED) -->
  <main id="landing" class="show">
    <img src="assets/growmore_logo.png" class="logo" alt="GrowMore Soil & Pasture Tuning">
    
    <p class="product">GrowMore Virtual Agronomist</p>
    <p class="launch">Mobile App launching soon</p>
  </main>

  <!-- SPLASH (UNCHANGED) -->
  <div id="splash" aria-hidden="true">
    <video id="splashVideo" autoplay muted playsinline preload="auto">
      <source src="assets/splash.mp4" type="video/mp4">
    </video>
  </div>

  

  <!-- JS -->
  <script>
    const splash = document.getElementById("splash");
    const video = document.getElementById("splashVideo");

    let dismissed = false;

    function dismissSplash() {
      if (dismissed) return;
      dismissed = true;

      splash.classList.add("fade");

      setTimeout(() => {
        splash.remove();
      }, 700);
    }

    video.addEventListener("ended", dismissSplash);
    video.addEventListener("error", dismissSplash);
    setTimeout(dismissSplash, 8000);

    // MOBILE MENU (UPDATED FOR NEW CSS)
    function toggleMenu() {
      const menu = document.getElementById("navLinks");
      menu.classList.toggle("active");
    }
  </script>

</body>
</html>
